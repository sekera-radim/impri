services:
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    ports:
      - "8484:8484"
    volumes:
      - impri-data:/app/data
    environment:
      DB_PATH: /app/data/impri.db
      PORT: "8484"
      HOST: "0.0.0.0"
      BASE_URL: "http://localhost:8080"
      WEBHOOK_SECRET: "${WEBHOOK_SECRET:-change-me-in-production}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8484/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  impri-data:
