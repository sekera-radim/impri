server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy /v1 → impri server service
    location /v1/ {
        proxy_pass http://server:8484/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check forwarded for compose health checks
    location /healthz {
        proxy_pass http://server:8484/healthz;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
